<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Imperial CSP ACT 复习</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">ACT</div>
          <div>
            <h1>Imperial CSP ACT 复习</h1>
            <p>ACT 选择题整理 · AI 识别 · 刷题复习</p>
          </div>
        </div>

        <nav class="nav-tabs" aria-label="主要页面">
          <button class="nav-tab active" data-view="upload">上传</button>
          <button class="nav-tab" data-view="library">题库</button>
          <button class="nav-tab" data-view="review">刷题</button>
          <button class="nav-tab" data-view="duplicates">查重</button>
        </nav>

        <section class="stats">
          <div><span id="statTotal">0</span><small>题目</small></div>
          <div><span id="statWithExplanations">0</span><small>有解析</small></div>
          <div><span id="statReviewed">0</span><small>已复习</small></div>
        </section>
      </aside>

      <main>
        <section class="view active" id="uploadView">
          <div class="page-heading">
            <div>
              <h2>上传 ACT 练习题</h2>
              <p>保留题目原图，AI 自动提取选项、答案和解析。</p>
            </div>
            <button class="secondary-button" id="clearFormButton">清空</button>
          </div>

          <div class="workspace-grid">
            <section class="panel upload-panel">
              <label class="drop-zone" for="questionImage">
                <input id="questionImage" type="file" accept="image/*" />
                <img id="previewImage" class="preview-image" alt="题目预览" hidden />
                <span class="drop-title">粘贴、拖拽或选择图片</span>
                <span class="drop-subtitle">复制截图后按 Ctrl+V，或把图片拖到这里，也可以点击选择文件。</span>
              </label>
              <div class="ocr-row">
                <button class="primary-button" id="aiExtractButton">AI 精准识别</button>
                
                <span id="ocrStatus">等待上传图片</span>
              </div>
            </section>

            <section class="panel editor-panel">
              <div class="form-grid">
                <label>课程<input id="courseInput" type="text" placeholder="例如 Advanced Communication Theory" /></label>
                <label>章节<input id="topicInput" type="text" placeholder="例如 Detection / Gaussian noise" /></label>
                <label>题型<select id="typeInput"><option>选择题</option><option>简答题</option><option>计算题</option><option>代码题</option><option>案例分析</option><option>其他</option></select></label>
                <label>难度<select id="difficultyInput"><option>普通</option><option>简单</option><option>困难</option></select></label>
              </div>

              <label>题目内容<textarea id="questionInput" rows="8" placeholder="AI/OCR 结果会出现在这里，也可以直接粘贴题目。"></textarea></label>
              <label>选项<textarea id="optionsInput" rows="5" placeholder="AI 会把 A/B/C/D/E 单独提取到这里，每行一个选项。"></textarea></label>

              <div class="form-grid">
                <label>正确选项<input id="correctAnswerInput" type="text" placeholder="例如 C" /></label>
                <label>标签<input id="tagsInput" type="text" placeholder="用逗号分隔，例如 Gaussian, matrix, MAP" /></label>
              </div>

              <label>答案/备注<textarea id="answerInput" rows="3" placeholder="可选：补充最终答案、老师标注或自己的备注。"></textarea></label>
              <label>AI 解析<textarea id="explanationInput" rows="5" placeholder="AI 生成的解析会出现在这里，也可以自己修改。"></textarea></label>
              <div class="duplicate-preview" id="duplicatePreview" hidden></div>

              <div class="action-row">
                <button class="primary-button" id="saveQuestionButton">保存题目</button>
                <button class="secondary-button" id="generateExplanationButton">生成解析草稿</button>
              </div>
            </section>
          </div>
        </section>

        <section class="view" id="libraryView">
          <div class="page-heading">
            <div><h2>ACT 题库</h2><p>按课程、章节、关键词和选项快速查找。</p></div>
            <div class="heading-actions"><button class="secondary-button" id="pdfExportButton">导出 PDF</button><button class="danger-button" id="exportButton">导出 JSON</button></div>
          </div>
          <div class="filters">
            <input id="searchInput" type="search" placeholder="搜索题干、选项、课程、章节、标签" />
            <select id="courseFilter"><option value="">全部课程</option></select>
            <select id="topicFilter"><option value="">全部章节</option></select>
            <select id="statusFilter"><option value="">全部状态</option><option value="explained">有解析</option><option value="todo">待解析</option><option value="reviewed">已复习</option></select>
          </div>
          <div class="question-list" id="questionList"></div>
        </section>

        <section class="view" id="reviewView">
          <div class="page-heading">
            <div><h2>选择题练习</h2><p>选择课程和章节后专项刷题，选项会随机打乱。</p></div>
            <button class="primary-button" id="randomQuestionButton">开始 / 下一题</button>
          </div>
          <div class="filters review-filters">
            <select id="reviewCourseFilter"><option value="">全部课程</option></select>
            <select id="reviewTopicFilter"><option value="">全部章节</option></select>
          </div>
          <section class="panel review-panel" id="reviewPanel"><p class="empty-state">选择章节后点击开始，或直接从全部题目中随机练习。</p></section>
        </section>

        <section class="view" id="duplicatesView">
          <div class="page-heading">
            <div><h2>重复检测</h2><p>用题干和选项一起比较，找出相似题。</p></div>
            <button class="secondary-button" id="scanDuplicatesButton">重新扫描</button>
          </div>
          <div class="duplicate-list" id="duplicateList"></div>
        </section>
      </main>
    </div>

    <template id="questionCardTemplate">
      <article class="question-card">
        <div class="card-topline">
          <div class="chips"></div>
          <div class="card-actions">
            <button class="icon-button edit-button" title="编辑">✎</button>
            <button class="icon-button reviewed-button" title="标记已复习">✓</button>
            <button class="icon-button delete-button" title="删除">×</button>
          </div>
        </div>
        <h3></h3>
        <p class="question-text"></p>
        <div class="answer-block"></div>
        <div class="explanation-block"></div>
      </article>
    </template>
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["$", "$"], ["\\(", "\\)"]],
          displayMath: [["$$", "$$"], ["\\[", "\\]"]],
          processEscapes: true
        },
        svg: { fontCache: "global" }
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
